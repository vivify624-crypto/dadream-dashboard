<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>다드림 청년부</title>

<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,'Apple SD Gothic Neo',sans-serif;background:#f5f5f3;color:#1a1a1a;min-height:100vh}
.sb{width:185px;background:#fff;border-right:0.5px solid rgba(0,0,0,.1);display:flex;flex-direction:column;position:fixed;top:0;left:0;height:100vh;z-index:20}
.sb-logo{padding:1rem;border-bottom:0.5px solid rgba(0,0,0,.06)}
.sb-t{font-size:14px;font-weight:600;color:#3C3489}
.sb-s{font-size:11px;color:#888;margin-top:2px}
.snav{padding:.4rem;flex:1}
.sni{display:flex;align-items:center;gap:8px;padding:9px 10px;border-radius:8px;cursor:pointer;font-size:13px;color:#888;margin-bottom:2px}
.sni:hover{background:#f5f5f3;color:#1a1a1a}
.sni.on{background:#EEEDFE;color:#3C3489;font-weight:500}
.sni-ic{font-size:15px;width:18px;text-align:center}
.sb-ft{padding:.75rem 1rem;border-top:0.5px solid rgba(0,0,0,.06);font-size:11px;color:#888}
.main{margin-left:185px;min-height:100vh}
.topbar{background:#fff;border-bottom:0.5px solid rgba(0,0,0,.1);padding:.875rem 1.5rem;position:sticky;top:0;z-index:10}
.tb-t{font-size:15px;font-weight:500}
.ct{padding:1.25rem 1.5rem 5rem}
.sec{display:none}.sec.on{display:block}
.mob-nav{display:none;position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:0.5px solid rgba(0,0,0,.1);z-index:20}
.mob-nav-inner{display:flex}
.mni{flex:1;display:flex;flex-direction:column;align-items:center;padding:8px 4px 6px;cursor:pointer;font-size:10px;color:#888;gap:2px}
.mni.on{color:#3C3489}
.mni-ic{font-size:20px;line-height:1}
.btn{padding:7px 14px;border-radius:8px;font-size:13px;cursor:pointer;border:0.5px solid rgba(0,0,0,.15);background:#fff;color:#1a1a1a;font-family:inherit}
.btn:active{opacity:.7}
.btn.pr{background:#3C3489;color:#fff;border-color:#3C3489}
.btn.sm{padding:5px 10px;font-size:12px}
.btn.xs{padding:3px 8px;font-size:11px}
.btn.dl{background:#FCEBEB;border-color:#F09595;color:#A32D2D}
.card{background:#fff;border:0.5px solid rgba(0,0,0,.1);border-radius:12px;padding:1.25rem}
.ct-t{font-size:14px;font-weight:500;margin-bottom:.875rem;display:flex;align-items:center;justify-content:space-between}
.tw{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;padding:7px 10px;background:#f5f5f3;color:#888;font-weight:500;font-size:12px;white-space:nowrap}
td{padding:8px 10px;border-top:0.5px solid rgba(0,0,0,.06);vertical-align:middle}
.fr{margin-bottom:11px}
.fl{font-size:12px;color:#888;margin-bottom:3px;display:block}
input.fi,textarea.fi,select.fi{width:100%;padding:8px 10px;border:0.5px solid rgba(0,0,0,.15);border-radius:6px;font-size:13px;background:#fff;color:#1a1a1a;font-family:inherit;-webkit-appearance:none;appearance:none}
input.fi:focus,textarea.fi:focus,select.fi:focus{outline:none;border-color:#3C3489}
textarea.fi{resize:vertical}
.frow{display:flex;gap:8px}
.frow .fr{flex:1}
.ov{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.5);z-index:100;display:none;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:20px 12px}
.ov.show{display:block}
.mbox{background:#fff;border-radius:14px;max-width:500px;margin:0 auto;padding:1.5rem;width:100%}
.mbox.nar{max-width:360px}
.mbox.wide{max-width:680px}
.mo-t{font-size:15px;font-weight:600;margin-bottom:1rem}
.mo-f{display:flex;justify-content:flex-end;gap:8px;margin-top:1rem;padding-top:1rem;border-top:0.5px solid rgba(0,0,0,.06)}
.cleg{display:flex;flex-wrap:wrap;gap:5px;background:#fff;border:0.5px solid rgba(0,0,0,.1);border-radius:10px;padding:7px 10px;margin-bottom:.75rem;align-items:center;min-height:36px}
.lchip{font-size:11px;border-radius:3px;padding:2px 7px;font-weight:500;cursor:pointer;user-select:none;display:inline-flex;align-items:center;gap:3px}
.lchip.on{outline:2px solid #3C3489;outline-offset:1px}
.lchip.dm{opacity:.3}
.lchip.p{background:#EEEDFE;color:#3C3489}.lchip.t{background:#E1F5EE;color:#0F6E56}
.lchip.c{background:#FAECE7;color:#993C1D}.lchip.a{background:#FAEEDA;color:#854F0B}
.lchip.b{background:#E6F1FB;color:#185FA5}.lchip.k{background:#FBEAF0;color:#993556}
.lchip.g{background:#F1EFE8;color:#5F5E5A}
.cal-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:.75rem;flex-wrap:wrap;gap:8px}
.cal-nav-left{display:flex;align-items:center;gap:10px}
.cal-nav-right{display:flex;gap:6px;flex-wrap:wrap}
.cal-month{font-size:17px;font-weight:600;min-width:90px;text-align:center}
.cgrid{display:grid;grid-template-columns:repeat(7,minmax(0,1fr));gap:1px;background:rgba(0,0,0,.08);border:0.5px solid rgba(0,0,0,.1);border-radius:12px;overflow:hidden}
.cgh{padding:6px 2px;text-align:center;font-size:11px;font-weight:500;color:#888;background:#f5f5f3}
.cgh.gs{color:#B85030}.cgh.ga{color:#185FA5}
.cgc{min-height:60px;padding:3px;background:#fff;cursor:pointer}
.cgc.om{background:#f5f5f3;cursor:default}
.cgc:not(.om):active{background:#f0f0ee}
.cgc.sl{background:#EEEDFE !important}
.cgc.td .cgn{background:#3C3489;color:#fff;border-radius:50%}
.cgn{font-size:11px;font-weight:500;width:20px;height:20px;display:flex;align-items:center;justify-content:center;margin-bottom:2px}
.cgn.gs{color:#B85030}.cgn.ga{color:#185FA5}.cgn.om{color:#bbb}
.ec{font-size:9px;border-radius:3px;padding:1px 4px;margin-bottom:1px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-weight:500;display:block;line-height:1.4}
.ec.p{background:#EEEDFE;color:#3C3489}.ec.t{background:#E1F5EE;color:#0F6E56}
.ec.c{background:#FAECE7;color:#993C1D}.ec.a{background:#FAEEDA;color:#854F0B}
.ec.b{background:#E6F1FB;color:#185FA5}.ec.k{background:#FBEAF0;color:#993556}
.ec.g{background:#F1EFE8;color:#5F5E5A}
.cdet{margin-top:.75rem;background:#fff;border:0.5px solid rgba(0,0,0,.1);border-radius:12px;padding:1rem}
.evb{margin-bottom:12px;padding-bottom:12px;border-bottom:0.5px solid rgba(0,0,0,.06)}
.evb:last-child{border-bottom:none;margin-bottom:0;padding-bottom:0}
.memobox{border-radius:8px;padding:8px 12px;font-size:13px;line-height:1.7;white-space:pre-wrap;margin-bottom:6px}
.memobox.g{background:#E1F5EE}.memobox.b{background:#E6F1FB}.memobox.n{background:#f5f5f3}
.memolbl{font-size:11px;font-weight:500;margin-bottom:4px}
.memolbl.g{color:#0F6E56}.memolbl.b{color:#185FA5}.memolbl.n{color:#888}
.ntlbl{font-size:11px;font-weight:500;color:#993C1D;margin-bottom:5px}
.ni{display:flex;align-items:flex-start;gap:8px;margin-bottom:6px;font-size:13px;line-height:1.5}
.ni input[type=checkbox]{margin-top:2px;width:16px;height:16px;flex-shrink:0}
.ni label{cursor:pointer}.ni.dk label{text-decoration:line-through;color:#bbb}
.rpbox{background:#f5f5f3;border-radius:8px;padding:9px;margin-top:6px;display:none;flex-direction:column;gap:7px}
.rpbox.on{display:flex}
.rpprev{font-size:12px;color:#0F6E56;padding:5px 9px;background:#E1F5EE;border-radius:6px}
.ckr{display:flex;align-items:center;gap:8px;font-size:13px}
.ckr input[type=checkbox]{cursor:pointer;width:16px;height:16px;flex-shrink:0}
.rpinfo{background:#f0f8f5;border:0.5px solid #5DCAA5;border-radius:8px;padding:8px 12px;font-size:13px;color:#0F6E56}
.brkbox{background:#FCEBEB;border-radius:8px;padding:8px 12px;border:0.5px solid #F09595;margin-top:7px}
.divr{border:none;border-top:0.5px solid rgba(0,0,0,.06);margin:8px 0}
.copt{display:flex;gap:8px;flex-wrap:wrap;margin-top:4px}
.csw{width:28px;height:28px;border-radius:50%;cursor:pointer;border:2px solid transparent;flex-shrink:0}
.csw.sel{border-color:#222}
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:.75rem}
.cell-card{background:#fff;border:0.5px solid rgba(0,0,0,.1);border-radius:10px;padding:.875rem;cursor:pointer}
.cell-card:active{opacity:.8}
.cell-nm{font-size:13px;font-weight:600;color:#3C3489;margin-bottom:3px}
.cell-ld{font-size:11px;color:#888;margin-bottom:5px}
.pills{display:flex;flex-wrap:wrap;gap:3px}
.pill{font-size:10px;background:#f5f5f3;border-radius:12px;padding:2px 7px;border:0.5px solid rgba(0,0,0,.06)}
.mem-row{display:flex;align-items:center;gap:8px;padding:7px 0;border-top:0.5px solid rgba(0,0,0,.06)}
.mem-name{flex:1;font-size:13px;font-weight:500}
.mem-tag{font-size:10px;background:#EEEDFE;color:#3C3489;border-radius:3px;padding:1px 5px}
.mem-tag.leader{background:#FAEEDA;color:#854F0B}
.wr-role{font-size:13px;font-weight:600;color:#3C3489;padding:9px 12px;border-right:0.5px solid rgba(0,0,0,.06);white-space:nowrap;background:#f9f9ff;width:90px}
.wr-val{font-size:13px;padding:9px 12px}
.chi{display:flex;align-items:center;gap:10px;padding:9px 12px;background:#fff;border:0.5px solid rgba(0,0,0,.1);border-radius:8px;margin-bottom:6px}
.chi.done .chi-t{text-decoration:line-through;color:#888}
.chi-t{flex:1;font-size:13px}
.scbox{background:#fff;border-radius:14px;padding:1.5rem;max-width:340px;width:100%;margin:0 auto}
.scbtn{padding:10px 14px;border-radius:8px;font-size:13px;cursor:pointer;border:0.5px solid rgba(0,0,0,.12);background:#fff;text-align:left;font-family:inherit;width:100%;margin-bottom:6px;display:block}
.scbtn:active{opacity:.7}
.scbtn.r{border-color:#F09595;color:#A32D2D}
.scbtn-sub{display:block;font-size:11px;color:#888;margin-top:2px}
.cfmbox{background:#fff;border-radius:14px;padding:1.25rem;max-width:320px;width:100%;margin:0 auto}
.cfm-msg{font-size:14px;margin-bottom:1rem;line-height:1.6}
.cfm-f{display:flex;justify-content:flex-end;gap:8px}
.hint{font-size:13px;color:#888;text-align:center;padding:2rem 0}
.flex-row{display:flex;align-items:center}
.flex-sb{justify-content:space-between}
.gap1{gap:.5rem}.gap2{gap:1rem}
.mu{color:#888;font-size:12px}
.mb2{margin-bottom:1rem}
.badge{display:inline-block;font-size:10px;border-radius:4px;padding:2px 6px;font-weight:500;margin-right:4px;background:#FAEEDA;color:#854F0B}
@media(max-width:700px){
  .sb{display:none}
  .main{margin-left:0}
  .mob-nav{display:block}
  .ct{padding:.75rem .875rem 80px}
  .g3{grid-template-columns:1fr 1fr}
  .topbar{padding:.75rem 1rem}
  .mbox.wide{max-width:100%}
  .cal-nav-right{width:100%}
  .cal-nav-right input{flex:1}
  .cgc{min-height:46px;padding:2px}
  .ec{font-size:8px}
}
@media(max-width:380px){
  .g3{grid-template-columns:1fr}
}
</style>
</head>
<body>
<div class="sb">
  <div class="sb-logo"><div class="sb-t">⛪ 다드림 청년부</div><div class="sb-s">통합 관리 시스템</div></div>
  <nav class="snav">
    <div class="sni on" data-s="cal"><span class="sni-ic">📅</span>일정 캘린더</div>
    <div class="sni" data-s="wed"><span class="sni-ic">💍</span>결혼 현황</div>
    <div class="sni" data-s="cells"><span class="sni-ic">👥</span>셀 명단</div>
    <div class="sni" data-s="worship"><span class="sni-ic">🙏</span>이번 주 예배</div>
    <div class="sni" data-s="chk"><span class="sni-ic">✅</span>체크리스트</div>
  </nav>
  <div style="padding:.75rem 1rem;border-top:0.5px solid rgba(0,0,0,.06);font-size:11px;color:#888" id="sb-ft">● 로컬 모드</div>
</div>

<div class="main">
  <div class="topbar"><span class="tb-t" id="tbt">일정 캘린더</span></div>
  <div class="ct">
    <div class="sec on" id="sec-cal">
      <div class="cleg" id="cleg"></div>
      <div class="cal-nav">
        <div class="cal-nav-left">
          <button class="btn" id="btnPrev">◀</button>
          <span class="cal-month" id="calml">로딩중...</span>
          <button class="btn" id="btnNext">▶</button>
        </div>
        <div class="cal-nav-right">
          <input id="calSq" class="fi" style="width:150px;padding:7px 10px" type="text" placeholder="일정 검색...">
          <button class="btn pr sm" id="btnCalAdd">+ 추가</button>
        </div>
      </div>
      <div id="calSr"></div>
      <div class="cgrid" id="calgrid"></div>
      <div id="caldet"><div class="cdet"><p class="hint">날짜를 탭하면 일정을 확인할 수 있어요</p></div></div>
    </div>
    <div class="sec" id="sec-wed">
      <div class="flex-row flex-sb mb2">
        <span class="mu" id="wedSum"></span>
        <button class="btn pr sm" id="btnWedAdd">+ 결혼 추가</button>
      </div>
      <div class="card">
        <div style="font-size:14px;font-weight:600;text-align:center;margin-bottom:1rem">26년 다드림 결혼식 현황</div>
        <div class="tw"><table><thead><tr><th>#</th><th>날짜</th><th>신랑</th><th>신부</th><th>장소</th><th>시간</th><th>사회</th><th>기도</th><th>주례</th><th>비고</th><th></th></tr></thead><tbody id="wedTbody"></tbody></table></div>
      </div>
    </div>
    <div class="sec" id="sec-cells">
      <div class="flex-row flex-sb mb2" style="flex-wrap:wrap;gap:8px">
        <span class="mu" id="cellsSum"></span>
        <div class="flex-row gap1">
          <input id="cellsSq" class="fi" style="width:150px;padding:7px 10px" type="text" placeholder="이름 검색...">
          <button class="btn pr sm" id="btnCellAdd">+ 셀 추가</button>
        </div>
      </div>
      <div class="g3" id="cellsGrid"></div>
    </div>
    <div class="sec" id="sec-worship">
      <div class="flex-row flex-sb mb2" style="flex-wrap:wrap;gap:8px">
        <select id="worshipSel" class="fi" style="width:160px"></select>
        <div class="flex-row gap1">
          <button class="btn sm pr" id="btnOrderAdd">+ 예배순서</button>
          <button class="btn sm pr" id="btnCommAdd">+ 예배위원</button>
        </div>
      </div>
      <div class="card mb2">
        <div class="ct-t"><span style="font-size:14px">✼ 예배순서</span><button class="btn sm" id="btnOrderEdit">수정</button></div>
        <div class="tw"><table><tbody id="orderTbody"></tbody></table></div>
      </div>
      <div class="card">
        <div class="ct-t"><span style="font-size:14px">✼ 예배위원</span></div>
        <div class="tw"><table><thead><tr><th>날짜</th><th>기도인도</th><th>대표기도</th><th>헌금위원</th><th>주차위원</th><th>청소담당</th><th>폰타나</th><th></th></tr></thead><tbody id="commTbody"></tbody></table></div>
      </div>
    </div>
    <div class="sec" id="sec-chk">
      <div class="card mb2">
        <div class="flex-row gap1" style="flex-wrap:wrap">
          <input class="fi" type="text" id="chkNew" placeholder="새 항목 입력..." style="flex:1;min-width:140px">
          <input class="fi" type="text" id="chkWho" placeholder="담당자" style="width:80px">
          <button class="btn pr" id="btnChkAdd">+ 추가</button>
        </div>
      </div>
      <div class="flex-row flex-sb mb2">
        <span class="mu" id="chkSum"></span>
        <button class="btn sm" id="btnChkClear">완료 지우기</button>
      </div>
      <div id="chkList"></div>
    </div>
  </div>
</div>

<div class="mob-nav">
  <div class="mob-nav-inner">
    <div class="mni on" data-s="cal"><div class="mni-ic">📅</div>일정</div>
    <div class="mni" data-s="wed"><div class="mni-ic">💍</div>결혼</div>
    <div class="mni" data-s="cells"><div class="mni-ic">👥</div>셀</div>
    <div class="mni" data-s="worship"><div class="mni-ic">🙏</div>예배</div>
    <div class="mni" data-s="chk"><div class="mni-ic">✅</div>체크</div>
  </div>
</div>

<!-- MODALS -->
<div class="ov" id="moCal"><div class="mbox">
  <div class="mo-t" id="moCalTtl">일정 추가</div>
  <div class="fr"><label class="fl">날짜</label><input class="fi" type="date" id="cFd"></div>
  <div class="fr"><label class="fl">제목</label><input class="fi" type="text" id="cFt"></div>
  <div class="fr"><label class="fl">색상</label><div class="copt" id="cCopt"></div></div>
  <div class="fr"><label class="fl">장소</label><input class="fi" type="text" id="cFm"></div>
  <div class="fr"><label class="fl">특이사항 (줄바꿈 구분)</label><textarea class="fi" id="cFn" rows="3"></textarea></div>
  <div class="fr" id="cGrmRow" style="display:none"><label class="fl" style="color:#0F6E56;font-weight:500">공통 메모</label><textarea class="fi" id="cFgm" rows="2"></textarea></div>
  <div class="fr"><label class="fl" id="cMl">메모</label><textarea class="fi" id="cFmo" rows="2"></textarea></div>
  <div class="divr"></div>
  <div id="cRpEdit" style="display:none">
    <div class="fr"><label class="fl">반복 정보</label><div class="rpinfo" id="cRpInfo"></div>
    <div class="brkbox" style="margin-top:7px"><div class="ckr"><input type="checkbox" id="cBrk"><label for="cBrk" style="color:#A32D2D;font-weight:500">루틴 해제</label></div></div></div>
  </div>
  <div id="cRpNew" class="fr">
    <label class="fl">반복 설정</label>
    <select class="fi" id="cFrp" style="width:auto"><option value="none">반복 안 함</option><option value="weekly">매주</option><option value="biweekly">격주</option><option value="monthly">매달</option></select>
    <div class="rpbox" id="cRpbox">
      <div><label class="fl">반복 종료</label><select class="fi" id="cRet" style="width:auto"><option value="date">날짜 지정</option><option value="yearend">연말까지</option></select></div>
      <div id="cRdw"><label class="fl">종료 날짜</label><input class="fi" type="date" id="cRed"></div>
      <div class="ckr"><input type="checkbox" id="cRn"><label for="cRn">회차 번호 자동 추가</label></div>
      <div class="rpprev" id="cRpv" style="display:none"></div>
    </div>
  </div>
  <div class="mo-f"><button class="btn" id="btnCalCancel">취소</button><button class="btn pr" id="btnCalSave">저장</button></div>
</div></div>

<div class="ov" id="moScope" style="padding-top:80px"><div class="scbox">
  <div style="font-size:14px;font-weight:500;margin-bottom:4px" id="scTtl"></div>
  <div style="font-size:12px;color:#888;margin-bottom:1rem;line-height:1.5" id="scSub"></div>
  <div id="scBtns"></div>
  <div style="margin-top:4px;font-size:13px;color:#888;text-align:center;cursor:pointer;padding:10px" id="btnScCancel">취소</div>
</div></div>

<div class="ov" id="moLbl" style="padding-top:80px"><div class="mbox nar">
  <div class="mo-t">색상 라벨 수정</div>
  <div class="fr"><label class="fl">라벨 텍스트</label><input class="fi" type="text" id="lblInp"></div>
  <div class="mo-f"><button class="btn" id="btnLblCancel">취소</button><button class="btn pr" id="btnLblSave">저장</button></div>
</div></div>

function parseMem(s) {
  // e.g. "남아름송이F1990" → {name, gender, by}
  var m = s.match(/^(.*?)([MF])(\d+)$/);
  if (!m) return {name:s, gender:'M', by:0};
  return {name:m[1], gender:m[2], by:parseInt(m[3],10)||0};
}
function buildCells() {
  var nc = {}, nm = {};
  for (var i = 0; i < CD.length; i++) {
    var row = CD[i];
    var num = row[0], lName = row[1], lGender = row[2], lBy = row[3], lPhone = row[4], mArr = row[5];
    var cid = 'c' + (num < 10 ? '0' + num : '' + num);
    var lid = 'm' + cid + '_0';
    nm[lid] = {name:lName, gender:lGender, birthYear:lBy, phone:lPhone, cellId:cid, role:'셀리더', status:'active'};
    for (var j = 0; j < mArr.length; j++) {
      var pm = parseMem(mArr[j]);
      nm['m' + cid + '_' + (j+1)] = {name:pm.name, gender:pm.gender, birthYear:pm.by||null, phone:'', cellId:cid, role:'멤버', status:'active'};
    }
    nc[cid] = {name:num + '셀', number:num, leaderId:lid, color:CCOL[(num-1) % CCOL.length]};
  }
  return {nc:nc, nm:nm};
}

function rCal() {
  var ml = V('calml'); if(ml) ml.textContent = gY + '년 ' + (gM+1) + '월';
  var fd = new Date(gY,gM,1).getDay();
  var dim = new Date(gY,gM+1,0).getDate();
  var pDim = new Date(gY,gM,0).getDate();
  var tdK = dkey(gToday.getFullYear(), gToday.getMonth(), gToday.getDate());
  var cells = [];
  for (var i=0; i<fd; i++) cells.push({d:pDim-fd+i+1, om:true, key:null});
  for (var d=1; d<=dim; d++) cells.push({d:d, om:false, key:dkey(gY,gM,d)});
  while (cells.length%7 !== 0) cells.push({d:cells.length-dim-fd+1, om:true, key:null});
  var h = '';
  for (var i=0; i<7; i++) h += '<div class="cgh' + (i===0?' gs':i===6?' ga':'') + '">' + DOW[i] + '</div>';
  for (var i=0; i<cells.length; i++) {
    var cell = cells[i], dow = i%7;
    var ev = (cell.key && gEvts[cell.key]) ? gEvts[cell.key] : null;
    var chips = '';
    if (ev && ev.length) {
      var cnt = ev.length < 3 ? ev.length : 3;
      for (var j=0; j<cnt; j++) {
        if (!gFC || ev[j].c === gFC) chips += '<div class="ec ' + (ev[j].c||'p') + '">' + ev[j].t + '</div>';
      }
    }
    var cls = 'cgc' + (cell.om?' om':'') + (cell.key===tdK?' td':'') + (cell.key===gSel?' sl':'');
    var gncls = 'cgn' + (dow===0?' gs':dow===6?' ga':'') + (cell.om?' om':'');
    h += '<div class="' + cls + '"' + (cell.key?' data-day="'+cell.key+'"':'') + '><div class="' + gncls + '">' + cell.d + '</div>' + chips + '</div>';
  }
  var cg = V('calgrid'); if(cg) cg.innerHTML = h;
}

function execSave(scope){
  if(!gPend||gPend.type==='del') return;
  var date=gPend.date,fEv=gPend.fEv,key=gPend.key,idx=gPend.idx;
  var isEdit=gPend.isEdit,existing=gPend.existing,doBreak=gPend.doBreak;
  var repeat=gPend.repeat,endDate=gPend.endDate,useNum=gPend.useNum;
  gPend=null;
  if(isEdit&&existing&&existing.grpId){
    var grp=findGrp(existing.grpId);
    var tgts=[];
    for(var i=0;i<grp.length;i++){
      if(scope==='single'&&grp[i].key===key&&grp[i].idx===idx) tgts.push(grp[i]);
      else if(scope==='following'&&grp[i].key>=key) tgts.push(grp[i]);
      else if(scope==='all') tgts.push(grp[i]);
    }
    if(doBreak){
      var base={};var ks=objKeys(gEvts[key][idx]);for(var ki=0;ki<ks.length;ki++)base[ks[ki]]=gEvts[key][idx][ks[ki]];
      base.t=fEv.t;base.c=fEv.c;base.m=fEv.m;base.n=fEv.n;base.memo=fEv.memo;
      gEvts[key][idx]=stripGrp(base);
      var bk={};
      for(var i=0;i<tgts.length;i++){if(tgts[i].key===key&&tgts[i].idx===idx)continue;if(!bk[tgts[i].key])bk[tgts[i].key]=[];bk[tgts[i].key].push(tgts[i].idx);}
      var bke=objEntries(bk);
      for(var i=0;i<bke.length;i++){var k=bke[i][0],idxs=bke[i][1];idxs.sort(function(a,b){return b-a});for(var j=0;j<idxs.length;j++){if(gEvts[k])gEvts[k].splice(idxs[j],1);}if(gEvts[k]&&!gEvts[k].length)delete gEvts[k];}
      saveEvts();calGoto(key);banner('루틴 해제됐어요');
    } else {
      for(var i=0;i<tgts.length;i++){
        var gk=tgts[i].key,gi=tgts[i].idx,gev=tgts[i].ev;
        var base=fEv.t.replace(/\s*\d+회차$/,'');
        var newT=gev.grpNum?base+' '+((gev.grpIdx||0)+1)+'회차':fEv.t;
        var upd={};var ks=objKeys(gEvts[gk][gi]);for(var ki=0;ki<ks.length;ki++)upd[ks[ki]]=gEvts[gk][gi][ks[ki]];
        upd.t=newT;upd.c=fEv.c;upd.m=fEv.m;upd.n=fEv.n;upd.memo=(gk===key&&gi===idx)?fEv.memo:gev.memo;upd.grpMemo=fEv.grpMemo;
        gEvts[gk][gi]=upd;
      }
      saveEvts();calGoto(key);banner('저장됐어요 ✓');
    }
    return;
  }
  if(isEdit&&existing&&!existing.grpId){
    if(repeat!=='none'&&endDate&&endDate>=date){
      var gid=uid(),dates=calOccs(date,endDate,repeat);
      var first={};var ks=objKeys(fEv);for(var ki=0;ki<ks.length;ki++)first[ks[ki]]=fEv[ks[ki]];
      first.t=useNum?fEv.t+' 1회차':fEv.t;first.grpId=gid;first.grpIdx=0;first.grpInterval=repeat;first.grpTitle=fEv.t;first.grpNum=useNum;first.memo='';first.grpMemo=fEv.memo;
      if(key===date){gEvts[key][idx]=first;}else{gEvts[key].splice(idx,1);if(!gEvts[key].length)delete gEvts[key];if(!gEvts[date])gEvts[date]=[];gEvts[date].push(first);}
      for(var i=1;i<dates.length;i++){var itm={};var ks2=objKeys(fEv);for(var ki=0;ki<ks2.length;ki++)itm[ks2[ki]]=fEv[ks2[ki]];itm.t=useNum?fEv.t+' '+(i+1)+'회차':fEv.t;itm.memo='';itm.grpMemo=fEv.memo;itm.grpId=gid;itm.grpIdx=i;itm.grpInterval=repeat;itm.grpTitle=fEv.t;itm.grpNum=useNum;if(!gEvts[dates[i]])gEvts[dates[i]]=[];gEvts[dates[i]].push(itm);}
      saveEvts();calGoto(date);banner('루틴 전환 · 총 '+dates.length+'회 ✓');return;
    }
    var upd={};var eks=objKeys(existing);for(var ki=0;ki<eks.length;ki++)upd[eks[ki]]=existing[eks[ki]];var fks=objKeys(fEv);for(var ki=0;ki<fks.length;ki++)upd[fks[ki]]=fEv[fks[ki]];
    if(key===date){gEvts[key][idx]=upd;}else{gEvts[key].splice(idx,1);if(!gEvts[key].length)delete gEvts[key];if(!gEvts[date])gEvts[date]=[];gEvts[date].push(upd);}
    saveEvts();calGoto(date);banner('저장됐어요 ✓');return;
  }
  if(repeat!=='none'&&endDate&&endDate>=date){
    var gid=uid(),dates=calOccs(date,endDate,repeat);
    for(var i=0;i<dates.length;i++){var itm={};var ks=objKeys(fEv);for(var ki=0;ki<ks.length;ki++)itm[ks[ki]]=fEv[ks[ki]];itm.t=useNum?fEv.t+' '+(i+1)+'회차':fEv.t;itm.memo='';itm.grpMemo=fEv.memo;itm.grpId=gid;itm.grpIdx=i;itm.grpInterval=repeat;itm.grpTitle=fEv.t;itm.grpNum=useNum;if(!gEvts[dates[i]])gEvts[dates[i]]=[];gEvts[dates[i]].push(itm);}
    saveEvts();calGoto(date);banner('총 '+dates.length+'개 루틴 저장 ✓');return;
  }
  var itm={};var ks=objKeys(fEv);for(var ki=0;ki<ks.length;ki++)itm[ks[ki]]=fEv[ks[ki]];
  if(!gEvts[date])gEvts[date]=[];gEvts[date].push(itm);
  saveEvts();calGoto(date);banner('저장됐어요 ✓');

function calKako(key){

  for(var ei=0;ei<ev.length;ei++){var e=ev[ei];lines.push('▸ '+e.t);if(e.m)lines.push('  📍 '+e.m);if(e.memo)lines.push('  📝 '+e.memo);if(e.n&&e.n.length){lines.push('  체크:');for(var ni=0;ni<e.n.length;ni++)lines.push('  '+(gChk[key+'-'+ei+'-'+ni]?'✅':'☐')+' '+e.n[ni]);}lines.push('');}
  var text=lines.join('\n').trim();
  try{if(navigator.clipboard)navigator.clipboard.writeText(text).then(function(){banner('복사됐어요! 📋')}).catch(function(){fallbackCopy(text);});}catch(ex){fallbackCopy(text);}
}
function fallbackCopy(t){var ta=document.createElement('textarea');ta.value=t;ta.style.cssText='position:fixed;top:-9999px;opacity:0';document.body.appendChild(ta);ta.select();try{document.execCommand('copy');banner('복사됐어요!');}catch(ex){}if(ta.parentNode)ta.parentNode.removeChild(ta);}

function rCells(){

  var totalM=objKeys(gMems).length;

// ── CHECKLIST ──
function rChk(){
  var items=objEntries(gChecks).sort(function(a,b){return (a[1].ts||0)-(b[1].ts||0)});
  var done=0;for(var i=0;i<items.length;i++){if(items[i][1].done)done++;}
  var cs=V('chkSum');if(cs)cs.textContent=done+' / '+items.length+'개 완료';
  var h='';
  if(!items.length) h='<p class="hint">항목을 추가해 주세요</p>';
  else for(var i=0;i<items.length;i++){var id=items[i][0],c=items[i][1];h+='<div class="chi'+(c.done?' done':'')+'"><input type="checkbox" data-cid="'+id+'"'+(c.done?' checked':'')+'><span class="chi-t">'+(c.text||'')+'</span>'+(c.who?'<span style="font-size:11px;color:#888">👤 '+c.who+'</span>':'')+'<button class="btn xs" data-cdel="'+id+'">✕</button></div>';}
  var cl=V('chkList');if(cl)cl.innerHTML=h;
}
