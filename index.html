<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0">
<title>다드림 청년부</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,'Apple SD Gothic Neo',sans-serif;background:#f5f5f3;color:#1a1a1a}
/* 사이드바 */
.sb{width:185px;background:#fff;border-right:0.5px solid rgba(0,0,0,.1);display:flex;flex-direction:column;position:fixed;top:0;left:0;height:100vh;z-index:20}
.sb-logo{padding:1rem;border-bottom:0.5px solid rgba(0,0,0,.06)}
.sb-t{font-size:14px;font-weight:600;color:#3C3489}
.sb-s{font-size:11px;color:#888;margin-top:2px}
.snav{padding:.4rem;flex:1}
.sni{display:flex;align-items:center;gap:8px;padding:9px 10px;border-radius:8px;cursor:pointer;font-size:13px;color:#888;margin-bottom:2px}
.sni.on{background:#EEEDFE;color:#3C3489;font-weight:500}
.sb-ft{padding:.75rem 1rem;border-top:0.5px solid rgba(0,0,0,.06);font-size:11px;color:#888}
/* 메인 */
.main{margin-left:185px;min-height:100vh}
.topbar{background:#fff;border-bottom:0.5px solid rgba(0,0,0,.1);padding:.875rem 1.5rem;position:sticky;top:0;z-index:10}
.tb-t{font-size:15px;font-weight:500}
.ct{padding:1.25rem 1.5rem 5rem}
.sec{display:none}.sec.on{display:block}
/* 모바일 하단 탭 */
.mob-nav{display:none;position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:0.5px solid rgba(0,0,0,.1);z-index:20}
.mob-nav-inner{display:flex}
.mni{flex:1;display:flex;flex-direction:column;align-items:center;padding:8px 4px 6px;cursor:pointer;font-size:10px;color:#888;gap:2px}
.mni.on{color:#3C3489}
.mni-ic{font-size:20px;line-height:1}
/* 버튼 */
.btn{padding:7px 14px;border-radius:8px;font-size:13px;cursor:pointer;border:0.5px solid rgba(0,0,0,.15);background:#fff;color:#1a1a1a;font-family:inherit}
.btn.pr{background:#3C3489;color:#fff;border-color:#3C3489}
.btn.sm{padding:5px 10px;font-size:12px}
.btn.xs{padding:3px 8px;font-size:11px}
.btn.dl{background:#FCEBEB;border-color:#F09595;color:#A32D2D}
/* 카드/테이블 */
.card{background:#fff;border:0.5px solid rgba(0,0,0,.1);border-radius:12px;padding:1.25rem}
.ct-t{font-size:14px;font-weight:500;margin-bottom:.875rem;display:flex;align-items:center;justify-content:space-between}
.tw{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;padding:7px 10px;background:#f5f5f3;color:#888;font-weight:500;font-size:12px;white-space:nowrap}
td{padding:8px 10px;border-top:0.5px solid rgba(0,0,0,.06);vertical-align:middle}
/* 폼 */
.fr{margin-bottom:11px}
.fl{font-size:12px;color:#888;margin-bottom:3px;display:block}
input.fi,textarea.fi,select.fi{width:100%;padding:8px 10px;border:0.5px solid rgba(0,0,0,.15);border-radius:6px;font-size:13px;background:#fff;color:#1a1a1a;font-family:inherit;-webkit-appearance:none}
input.fi:focus,textarea.fi:focus,select.fi:focus{outline:none;border-color:#3C3489}
textarea.fi{resize:vertical}
.frow{display:flex;gap:8px}
.frow .fr{flex:1}
/* 모달 */
.ov{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.5);z-index:100;display:none;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:20px 12px}
.ov.show{display:block}
.mbox{background:#fff;border-radius:14px;max-width:500px;margin:0 auto;padding:1.5rem;width:100%}
.mbox.wide{max-width:680px}
.mbox.nar{max-width:360px}
.mo-t{font-size:15px;font-weight:600;margin-bottom:1rem}
.mo-f{display:flex;justify-content:flex-end;gap:8px;margin-top:1rem;padding-top:1rem;border-top:0.5px solid rgba(0,0,0,.06)}
/* 캘린더 */
.cleg{display:flex;flex-wrap:wrap;gap:5px;background:#fff;border:0.5px solid rgba(0,0,0,.1);border-radius:10px;padding:6px 8px;margin-bottom:.5rem;align-items:center}
.lchip{font-size:11px;border-radius:3px;padding:2px 6px;font-weight:500;cursor:pointer;display:inline-flex;align-items:center;gap:3px}
.lchip.on{outline:2px solid #3C3489;outline-offset:1px}
.lchip.dm{opacity:.3}
.lchip.p{background:#EEEDFE;color:#3C3489}.lchip.t{background:#E1F5EE;color:#0F6E56}
.lchip.c{background:#FAECE7;color:#993C1D}.lchip.a{background:#FAEEDA;color:#854F0B}
.lchip.b{background:#E6F1FB;color:#185FA5}.lchip.k{background:#FBEAF0;color:#993556}
.lchip.g{background:#F1EFE8;color:#5F5E5A}

.cal-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:.5rem;flex-wrap:wrap;gap:6px}
.cal-nav-left{display:flex;align-items:center;gap:8px}
.cal-nav-right{display:flex;gap:6px;flex-wrap:wrap}
.cal-month{font-size:16px;font-weight:600;min-width:84px;text-align:center}

.cgrid{display:grid;grid-template-columns:repeat(7,minmax(0,1fr));gap:1px;background:rgba(0,0,0,.08);border:0.5px solid rgba(0,0,0,.1);border-radius:12px;overflow:hidden}
.cgh{padding:5px 2px;text-align:center;font-size:11px;font-weight:500;color:#888;background:#f5f5f3}
.cgh.gs{color:#B85030}.cgh.ga{color:#185FA5}

.cgc{min-height:52px;padding:2px;background:#fff;cursor:pointer}
.cgc.om{background:#f5f5f3;cursor:default}
.cgc.sl{background:#EEEDFE !important}
.cgc.td .cgn{background:#3C3489;color:#fff;border-radius:50%}

.cgn{font-size:11px;font-weight:500;width:20px;height:20px;display:flex;align-items:center;justify-content:center;margin-bottom:1px}
.cgn.gs{color:#B85030}.cgn.ga{color:#185FA5}.cgn.om{color:#bbb}

.ec{font-size:9px;border-radius:3px;padding:1px 4px;margin-bottom:1px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-weight:500;display:block;line-height:1.25}
.ec.p{background:#EEEDFE;color:#3C3489}.ec.t{background:#E1F5EE;color:#0F6E56}
.ec.c{background:#FAECE7;color:#993C1D}.ec.a{background:#FAEEDA;color:#854F0B}
.ec.b{background:#E6F1FB;color:#185FA5}.ec.k{background:#FBEAF0;color:#993556}
.ec.g{background:#F1EFE8;color:#5F5E5A}

.cdet{margin-top:.5rem;background:#fff;border:0.5px solid rgba(0,0,0,.1);border-radius:12px;padding:.9rem 1rem;overflow-x:hidden;word-break:break-word}
.evb{margin-bottom:10px;padding-bottom:10px;border-bottom:0.5px solid rgba(0,0,0,.06)}
.evb:last-child{border-bottom:none;margin-bottom:0;padding-bottom:0}
.memobox{border-radius:8px;padding:8px 12px;font-size:13px;line-height:1.7;white-space:pre-wrap;margin-bottom:6px;word-break:break-word;overflow-wrap:break-word}
.memobox.g{background:#E1F5EE}.memobox.b{background:#E6F1FB}.memobox.n{background:#f5f5f3}
.memolbl{font-size:11px;font-weight:500;margin-bottom:4px}
.memolbl.g{color:#0F6E56}.memolbl.b{color:#185FA5}.memolbl.n{color:#888}
.ntlbl{font-size:11px;font-weight:500;color:#993C1D;margin-bottom:5px}
.ni{display:flex;align-items:flex-start;gap:8px;margin-bottom:6px;font-size:13px;line-height:1.5}
.ni input[type=checkbox]{margin-top:2px;width:16px;height:16px;flex-shrink:0}
.ni label{cursor:pointer}.ni.dk label{text-decoration:line-through;color:#bbb}
.rpbox{background:#f5f5f3;border-radius:8px;padding:9px;margin-top:6px;display:none;flex-direction:column;gap:7px}
.rpbox.on{display:flex}
.rpprev{font-size:12px;color:#0F6E56;padding:5px 9px;background:#E1F5EE;border-radius:6px}
.ckr{display:flex;align-items:center;gap:8px;font-size:13px}
.ckr input[type=checkbox]{cursor:pointer;width:16px;height:16px;flex-shrink:0}
.rpinfo{background:#f0f8f5;border:0.5px solid #5DCAA5;border-radius:8px;padding:8px 12px;font-size:13px;color:#0F6E56}
.brkbox{background:#FCEBEB;border-radius:8px;padding:8px 12px;border:0.5px solid #F09595;margin-top:7px}
.divr{border:none;border-top:0.5px solid rgba(0,0,0,.06);margin:8px 0}
.copt{display:flex;gap:8px;flex-wrap:wrap;margin-top:4px}
.csw{width:28px;height:28px;border-radius:50%;cursor:pointer;border:2px solid transparent;flex-shrink:0}
.csw.sel{border-color:#222}
/* 셀 */
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:.75rem}
.cell-card{background:#fff;border:0.5px solid rgba(0,0,0,.1);border-radius:10px;padding:.875rem;cursor:pointer}
.cell-nm{font-size:13px;font-weight:600;color:#3C3489;margin-bottom:3px}
.cell-ld{font-size:11px;color:#888;margin-bottom:5px}
.pills{display:flex;flex-wrap:wrap;gap:3px}
.pill{font-size:10px;background:#f5f5f3;border-radius:12px;padding:2px 7px;border:0.5px solid rgba(0,0,0,.06)}
/* 멤버 목록 */
.mem-row{display:flex;align-items:center;gap:10px;padding:9px 0;border-top:0.5px solid rgba(0,0,0,.06);flex-wrap:wrap}
.mem-row:first-child{border-top:none}
.mem-av{width:44px;height:44px;border-radius:50%;background:#EEEDFE;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;overflow:hidden}
.mem-av img{width:100%;height:100%;object-fit:cover}
.mem-av.has-photo{cursor:pointer;border:2px solid #EEEDFE}
.mem-info{flex:1;min-width:0}
.mem-name{font-size:13px;font-weight:600}
.mem-tag{font-size:10px;background:#EEEDFE;color:#3C3489;border-radius:3px;padding:1px 5px}
.mem-tag.leader{background:#FAEEDA;color:#854F0B}
/* 멤버 태그 */
.mtag{display:inline-block;font-size:10px;border-radius:10px;padding:1px 7px;font-weight:500;margin-right:3px;margin-top:2px}
.mtag.care{background:#FCEBEB;color:#A32D2D}
.mtag.new{background:#E1F5EE;color:#0F6E56}
.mtag.faith{background:#E6F1FB;color:#185FA5}
.mtag.lead{background:#EEEDFE;color:#3C3489}
.mtag.etc{background:#f5f5f3;color:#555}
/* 예배 */
.wr-role{font-size:13px;font-weight:600;color:#3C3489;padding:9px 12px;border-right:0.5px solid rgba(0,0,0,.06);white-space:nowrap;background:#f9f9ff;width:90px}
.wr-val{font-size:13px;padding:9px 12px;word-break:break-word}
/* 체크리스트 */
.chi{display:flex;align-items:center;gap:10px;padding:9px 12px;background:#fff;border:0.5px solid rgba(0,0,0,.1);border-radius:8px;margin-bottom:6px}
.chi.done .chi-t{text-decoration:line-through;color:#888}
.chi-t{flex:1;font-size:13px}
/* scope */
.scbox{background:#fff;border-radius:14px;padding:1.5rem;max-width:340px;width:100%;margin:0 auto}
.scbtn{padding:10px 14px;border-radius:8px;font-size:13px;cursor:pointer;border:0.5px solid rgba(0,0,0,.12);background:#fff;text-align:left;font-family:inherit;width:100%;margin-bottom:6px;display:block}
.scbtn.r{border-color:#F09595;color:#A32D2D}
.scbtn-sub{display:block;font-size:11px;color:#888;margin-top:2px}
/* cfm */
.cfmbox{background:#fff;border-radius:14px;padding:1.25rem;max-width:320px;width:100%;margin:0 auto}
.cfm-msg{font-size:14px;margin-bottom:1rem;line-height:1.6}
.cfm-f{display:flex;justify-content:flex-end;gap:8px}
/* 기타 */
.hint{font-size:13px;color:#888;text-align:center;padding:2rem 0}
.row{display:flex;align-items:center}
.sb2{justify-content:space-between}
.g1{gap:.5rem}.g2{gap:1rem}
.mu{color:#888;font-size:12px}
.mb2{margin-bottom:1rem}
.badge{display:inline-block;font-size:10px;border-radius:4px;padding:2px 6px;font-weight:500;margin-right:4px;background:#FAEEDA;color:#854F0B}
@media(max-width:700px){
  .sb{display:none}.main{margin-left:0}.mob-nav{display:block}
  .ct{padding:.75rem .875rem 80px}.g3{grid-template-columns:1fr 1fr}
  .topbar{padding:.75rem 1rem}.mbox.wide{max-width:100%}
  .cal-nav-right{width:100%}
  .cal-month{font-size:15px;min-width:auto}
  .cgc{min-height:44px;padding:2px}
  .ec{font-size:8px}
  .frow{flex-direction:column;gap:0}
}
@media (min-width:1100px){
  /* PC에서 캘린더만 너무 가로로 퍼져 보이는 문제 수정 */
  #I_s_cal{
    max-width:1180px;
    margin:0 auto;
  }

  /* 달력 칸 높이 다시 확보 */
  .cgc{
    min-height:78px;
    padding:4px 5px;
  }

  /* 날짜 숫자와 일정칩 간격 조금 여유 */
  .cgn{
    margin-bottom:4px;
  }

  /* 일정칩 가독성 복구 */
  .ec{
    font-size:10px;
    line-height:1.3;
    padding:2px 5px;
    margin-bottom:2px;
  }

  /* 상단 검색/버튼 줄도 달력 폭에 맞춤 */
  .cal-nav,
  .cleg,
  #I_sr,
  .cgrid,
  #I_det{
    max-width:1180px;
    margin-left:auto;
    margin-right:auto;
  }
}
</style>
</head>
<body>

<!-- 사이드바 -->
<div class="sb">
  <div class="sb-logo"><div class="sb-t">⛪ 다드림 청년부</div><div class="sb-s">통합 관리 시스템</div></div>
  <nav class="snav">
    <div class="sni on" data-s="cal">📅 일정 캘린더</div>
    <div class="sni" data-s="wed">💍 결혼 현황</div>
    <div class="sni" data-s="cells">👥 셀 명단</div>
    <div class="sni" data-s="worship">🙏 이번 주 예배</div>
    <div class="sni" data-s="chk">✅ 체크리스트</div>
  </nav>
  <div class="sb-ft" id="FB_ST">● 로컬 모드</div>
</div>

<!-- 메인 -->
<div class="main">
  <div class="topbar"><span class="tb-t" id="I_tbt">일정 캘린더</span></div>
  <div class="ct">

    <!-- 캘린더 -->
    <div class="sec on" id="I_s_cal">
      <div class="cleg" id="I_leg"></div>
      <div class="cal-nav">
        <div class="cal-nav-left">
          <button class="btn" id="I_prev">◀</button>
          <span class="cal-month" id="I_ml"></span>
          <button class="btn" id="I_next">▶</button>
        </div>
        <div class="cal-nav-right">
          <input id="I_sq" class="fi" style="width:150px;padding:7px 10px" type="text" placeholder="일정 검색...">
          <button class="btn pr sm" id="I_cadd">+ 추가</button>
        </div>
      </div>
      <div id="I_sr"></div>
      <div class="cgrid" id="I_grid"></div>
      <div id="I_det"><div class="cdet"><p class="hint">날짜를 탭하면 일정을 확인할 수 있어요</p></div></div>
    </div>

    <!-- 결혼 -->
    <div class="sec" id="I_s_wed">
      <div class="row sb2 mb2"><span class="mu" id="I_wsum"></span><button class="btn pr sm" id="I_wadd">+ 결혼 추가</button></div>
      <div style="font-size:14px;font-weight:600;text-align:center;margin-bottom:1rem">26년 다드림 결혼식 현황</div>
      <div id="I_wtb"></div>
    </div>

    <!-- 셀 명단 -->
    <div class="sec" id="I_s_cells">
      <div class="row sb2 mb2" style="flex-wrap:wrap;gap:8px">
        <span class="mu" id="I_csum"></span>
        <div class="row g1">
          <input id="I_csq" class="fi" style="width:140px;padding:7px 10px" type="text" placeholder="이름 검색...">
          <button class="btn pr sm" id="I_cnadd">+ 셀 추가</button>
        </div>
      </div>
      <div class="g3" id="I_cgrid"></div>
    </div>

    <!-- 예배 -->
    <div class="sec" id="I_s_worship">
      <div class="row sb2 mb2" style="flex-wrap:wrap;gap:8px">
        <select id="I_wsel" class="fi" style="width:160px"></select>
        <div class="row g1">
          <button class="btn sm pr" id="I_oadd">+ 예배순서</button>
          <button class="btn sm pr" id="I_kadd">+ 예배위원</button>
        </div>
      </div>
      <div class="card mb2"><div class="ct-t"><span>✼ 예배순서</span><button class="btn sm" id="I_oedit">수정</button></div><div class="tw"><table><tbody id="I_otb"></tbody></table></div></div>
      <div class="card"><div class="ct-t"><span>✼ 예배위원</span></div><div class="tw"><table><thead><tr><th>날짜</th><th>기도인도</th><th>대표기도</th><th>헌금위원</th><th>주차위원</th><th>청소담당</th><th>폰타나</th><th></th></tr></thead><tbody id="I_ktb"></tbody></table></div></div>
    </div>

    <!-- 체크리스트 -->
    <div class="sec" id="I_s_chk">
      <div class="card mb2">
        <div class="row g1" style="flex-wrap:wrap">
          <input class="fi" type="text" id="I_cnew" placeholder="새 항목 입력..." style="flex:1;min-width:140px">
          <input class="fi" type="text" id="I_cwho" placeholder="담당자" style="width:80px">
          <button class="btn pr" id="I_ckadd">+ 추가</button>
        </div>
      </div>
      <div class="row sb2 mb2"><span class="mu" id="I_cksum"></span><button class="btn sm" id="I_ckclear">완료 지우기</button></div>
      <div id="I_cklist"></div>
    </div>

  </div>
</div>

<!-- 모바일 하단 탭 -->
<div class="mob-nav"><div class="mob-nav-inner">
  <div class="mni on" data-s="cal"><div class="mni-ic">📅</div>일정</div>
  <div class="mni" data-s="wed"><div class="mni-ic">💍</div>결혼</div>
  <div class="mni" data-s="cells"><div class="mni-ic">👥</div>셀</div>
  <div class="mni" data-s="worship"><div class="mni-ic">🙏</div>예배</div>
  <div class="mni" data-s="chk"><div class="mni-ic">✅</div>체크</div>
</div></div>

<!-- ===== MODALS ===== -->

<!-- 캘린더 -->
<div class="ov" id="M_cal"><div class="mbox">
  <div class="mo-t" id="M_calT">일정 추가</div>
  <div class="fr"><label class="fl">날짜</label><input class="fi" type="date" id="M_cfd"></div>
  <div class="fr"><label class="fl">제목</label><input class="fi" type="text" id="M_cft"></div>
  <div class="fr"><label class="fl">색상</label><div class="copt" id="M_copt"></div></div>
  <div class="fr"><label class="fl">장소</label><input class="fi" type="text" id="M_cloc"></div>
  <div class="fr"><label class="fl">특이사항 (줄바꿈 구분)</label><textarea class="fi" id="M_cfn" rows="3"></textarea></div>
  <div class="fr" id="M_grm" style="display:none"><label class="fl" style="color:#0F6E56;font-weight:500">공통 메모</label><textarea class="fi" id="M_cfg" rows="2"></textarea></div>
  <div class="fr"><label class="fl" id="M_cml">메모</label><textarea class="fi" id="M_cfmo" rows="2"></textarea></div>
  <div class="divr"></div>
  <div id="M_rpe" style="display:none"><div class="fr"><label class="fl">반복 정보</label><div class="rpinfo" id="M_rpi"></div><div class="brkbox" style="margin-top:7px"><div class="ckr"><input type="checkbox" id="M_brk"><label for="M_brk" style="color:#A32D2D;font-weight:500">루틴 해제</label></div></div></div></div>
  <div id="M_rpn" class="fr">
    <label class="fl">반복 설정</label>
    <select class="fi" id="M_frp" style="width:auto"><option value="none">반복 안 함</option><option value="weekly">매주</option><option value="biweekly">격주</option><option value="monthly">매달</option></select>

  var n=$('M_mn').value.trim();if(!n){banner('이름을 입력해 주세요',true);return;}
  var id=eMid||uid(),role=$('M_mr').value;
  // 태그
  var cbs=$('M_mtags').querySelectorAll('input[type=checkbox]'),selTags=[];
  for(var i=0;i<cbs.length;i++){if(cbs[i].checked)selTags.push(cbs[i].value);}
  // 데이터
  var md={name:n,gender:$('M_mg').value,cellId:eCid,role:role};
  var by=parseInt($('M_mb').value,10);if(by)md.birthYear=by;
  var ph=$('M_mp').value.trim();if(ph)md.phone=ph;
  if(selTags.length)md.tags=selTags;
  // 사진: null=기존유지, ''=삭제, 'data:...'=새사진
  if(mPhotoURL===null){if(eMid&&gMems[eMid]&&gMems[eMid].photo)md.photo=gMems[eMid].photo;}
  else if(mPhotoURL!=='')md.photo=mPhotoURL;
  // 저장
  gMems[id]=md;
  if(role==='셀리더'){gCells[eCid].leaderId=id;fbSet('cells/'+eCid,gCells[eCid]);}
  fbSet('members/'+id,md);
  mPhotoURL=null;
  hideMo('M_mem');rMemList(eCid);rCells();banner('저장됐어요 ✓');
};

/* ============================================================
   WORSHIP
============================================================ */
function rWorship(){
  var oList=ents(gOrd).sort(function(a,b){return(a[1].date||'').localeCompare(b[1].date||'')});
  var kList=ents(gKom).sort(function(a,b){return(a[1].date||'').localeCompare(b[1].date||'')});
  var sel=$('I_wsel'),prev=sel.value;
  if(oList.length){var oh='';for(var i=0;i<oList.length;i++){var o=oList[i][1];oh+='<option value="'+o.date+'"'+(o.date===prev?' selected':'')+'>'+fmtD(o.date)+'</option>';}sel.innerHTML=oh;}
  else sel.innerHTML='<option value="">예배순서 없음</option>';
  var selDate=sel.value||'',order={},orderId=null;
  var ov=vals(gOrd),ok=keys(gOrd);for(var i=0;i<ov.length;i++){if(ov[i].date===selDate){order=ov[i];orderId=ok[i];break;}}
  var oeb=$('I_oedit');if(oeb)oeb.setAttribute('data-oid',orderId||'');
  var roles=[['예배전기도',order.pre||''],['찬양',order.praise||''],['대표기도',order.repray||''],['말씀',order.sermon||''],['결단',order.decision||'다 같이'],['헌금',order.offering||''],['축도',order.bene||'']];
  var oh='';for(var i=0;i<roles.length;i++)oh+='<tr><td class="wr-role">'+roles[i][0]+'</td><td class="wr-val">'+esc(roles[i][1])+'</td></tr>';
  $('I_otb').innerHTML=oh;
  var kh='';
  if(!kList.length){kh='<tr><td colspan="8" style="text-align:center;padding:1.5rem;color:#888">예배위원 데이터가 없어요</td></tr>';}
  else{for(var i=0;i<kList.length;i++){var id2=kList[i][0],k=kList[i][1];kh+='<tr><td style="font-weight:500;white-space:nowrap">'+fmtD(k.date)+'</td><td>'+esc(k['기도인도']||'')+'</td><td>'+esc(k['대표기도']||'')+'</td><td>'+esc(k['헌금위원']||'')+'</td><td>'+esc(k['주차위원']||'')+'</td><td>'+esc(k['청소담당']||'')+'</td><td>'+esc(k['폰타나']||'')+'</td><td><button class="btn xs" data-kom="'+id2+'">수정</button></td></tr>';}}
  $('I_ktb').innerHTML=kh;
}
function openOrd(id){eOrd=id||null;var o=id?gOrd[id]:{};$('M_ordT').textContent=id?'예배순서 수정':'예배순서 추가';$('M_od').value=o.date||'';$('M_op').value=o.pre||'';$('M_opr').value=o.praise||'';$('M_orp').value=o.repray||'';$('M_os').value=o.sermon||'';$('M_ode').value=o.decision||'다 같이';$('M_of').value=o.offering||'';$('M_ob').value=o.bene||'';$('M_odel').style.display=id?'':'none';showMo('M_ord');}
function openKom(id){eKom=id||null;var k=id?gKom[id]:{};$('M_komT').textContent=id?'예배위원 수정':'예배위원 추가';$('M_kd').value=k.date||'';$('M_kp').value=k['기도인도']||'';$('M_kr').value=k['대표기도']||'';$('M_kh').value=k['헌금위원']||'';$('M_kj').value=k['주차위원']||'';$('M_kc').value=k['청소담당']||'';$('M_kf').value=k['폰타나']||'';$('M_kdel').style.display=id?'':'none';showMo('M_kom');}
$('I_wsel').onchange=rWorship;
$('I_oadd').onclick=function(){openOrd(null);};
$('I_oedit').onclick=function(){openOrd(this.getAttribute('data-oid')||null);};
$('I_kadd').onclick=function(){openKom(null);};
$('I_s_worship').onclick=function(e){var b=findUp(e.target,'data-kom');if(b)openKom(b.getAttribute('data-kom'));};
$('M_oX').onclick=function(){hideMo('M_ord');};
$('M_odel').onclick=function(){
  if(!eOrd)return;
  cfm('예배순서를 삭제할까요?',function(){
    var id=eOrd;
    _skipListener.orders=true;
    delete gOrd[id]; if(FB) FB.ref('worship_orders/'+id).remove().then(function(){setTimeout(function(){_skipListener.orders=false;},2000);});
    hideMo('M_ord'); rWorship(); banner('삭제됐어요');
  });
};
$('M_oS').onclick=function(){var date=$('M_od').value;if(!date){banner('날짜를 입력해 주세요',true);return;}var id=eOrd||uid();gOrd[id]={date:date,pre:$('M_op').value.trim(),praise:$('M_opr').value.trim(),repray:$('M_orp').value.trim(),sermon:$('M_os').value.trim(),decision:$('M_ode').value.trim()||'다 같이',offering:$('M_of').value.trim(),bene:$('M_ob').value.trim()};fbSet('worship_orders/'+id,gOrd[id]);hideMo('M_ord');rWorship();banner('저장됐어요 ✓');};
$('M_kX').onclick=function(){hideMo('M_kom');};
$('M_kdel').onclick=function(){
  if(!eKom)return;
  cfm('예배위원을 삭제할까요?',function(){
    var id=eKom;
    _skipListener.committee=true;
    delete gKom[id]; if(FB) FB.ref('worship_committee/'+id).remove().then(function(){setTimeout(function(){_skipListener.committee=false;},2000);});
    hideMo('M_kom'); rWorship(); banner('삭제됐어요');
  });
};
$('M_kS').onclick=function(){var date=$('M_kd').value;if(!date){banner('날짜를 입력해 주세요',true);return;}var id=eKom||uid();gKom[id]={date:date,'기도인도':$('M_kp').value.trim(),'대표기도':$('M_kr').value.trim(),'헌금위원':$('M_kh').value.trim(),'주차위원':$('M_kj').value.trim(),'청소담당':$('M_kc').value.trim(),'폰타나':$('M_kf').value.trim()};fbSet('worship_committee/'+id,gKom[id]);hideMo('M_kom');rWorship();banner('저장됐어요 ✓');};

/* ============================================================
   CHECKLIST
============================================================ */
function rChk(){
  var items=ents(gChecks).sort(function(a,b){return(a[1].ts||0)-(b[1].ts||0)});
  var done=0;for(var i=0;i<items.length;i++){if(items[i][1].done)done++;}
  $('I_cksum').textContent=done+' / '+items.length+'개 완료';
  var h='';if(!items.length){h='<p class="hint">항목을 추가해 주세요</p>';}
  else{for(var i=0;i<items.length;i++){var id=items[i][0],c=items[i][1];h+='<div class="chi'+(c.done?' done':'')+'"><input type="checkbox" data-cid="'+id+'"'+(c.done?' checked':'')+'><span class="chi-t">'+esc(c.text||'')+'</span>'+(c.who?'<span style="font-size:11px;color:#888">👤 '+esc(c.who)+'</span>':'')+'<button class="btn xs" data-cdel="'+id+'">✕</button></div>';}}
  $('I_cklist').innerHTML=h;
}
$('I_ckadd').onclick=function(){var text=$('I_cnew').value.trim();if(!text){banner('항목을 입력해 주세요',true);return;}var who=$('I_cwho').value.trim(),id=uid();gChecks[id]={text:text,who:who,done:false,ts:Date.now()};fbSet('checks/'+id,gChecks[id]);$('I_cnew').value='';$('I_cwho').value='';rChk();banner('추가됐어요 ✓');};
$('I_cnew').onkeydown=function(e){if((e.keyCode||e.which)===13)$('I_ckadd').onclick();};
$('I_ckclear').onclick=function(){var ks=keys(gChecks),toDel=[],i;for(i=0;i<ks.length;i++){if(gChecks[ks[i]].done)toDel.push(ks[i]);}if(!toDel.length){banner('완료된 항목이 없어요');return;}for(i=0;i<toDel.length;i++){delete gChecks[toDel[i]];fbDel('checks/'+toDel[i]);}rChk();banner(toDel.length+'개 삭제됐어요');};
$('I_cklist').onclick=function(e){var d=findUp(e.target,'data-cdel');if(d){delete gChecks[d.getAttribute('data-cdel')];fbDel('checks/'+d.getAttribute('data-cdel'));rChk();}};
$('I_cklist').onchange=function(e){var t=e.target;if(t&&t.getAttribute('data-cid')){var id=t.getAttribute('data-cid');if(gChecks[id]){gChecks[id].done=t.checked;fbSet('checks/'+id+'/done',t.checked);}rChk();}};

/* ============================================================
   INIT
============================================================ */
rLeg();rCal();rWed();rCells();rWorship();rChk();

})();
</script>
